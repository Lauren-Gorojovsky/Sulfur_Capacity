name: Render Quarto notebook

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R packages
        shell: Rscript {0}
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c(
            "readxl",
            "glmnet",
            "tibble",
            "ggplot2",
            "dplyr",
            "patchwork",
            "ggprism",
            "scales",
            "remotes"
          ))

          remotes::install_url(
            "https://github.com/ryantibs/conformal/archive/refs/heads/master.tar.gz",
            subdir = "conformalInference",
            upgrade = "never"
          )

      - name: Render Quarto notebook
        run: |
          mkdir -p _site
          quarto render S2_LASSO_regression.qmd --output-dir _site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
